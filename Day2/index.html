<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: rgb(13, 365, 20);
        }
        .name{
            color: rgb(43, 13, 132);
            background-color: lightblue;
            display: inline;
        }
        #example{
            margin: 50px;
            padding: 10px 10px 200px 100px;
            height: 400px;
            width: 400px;
            font-size: 96px;
            color:rgb(192, 14, 44);
            border: 20px double rgb(213, 194, 23);
         
        }
        h1:hover{
            color: tomato;
        }
        .text{
            padding: 10px;
            width:300px;
            height:300px;
            background-color: lightseagreen;
            font-size: 30px;
            border-radius: 50%;
            text-align: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-overflow: clip;
            text-shadow:5px 5px 5px  black;
            text-underline-offset: initial;
            box-shadow: 5px 5px 5px 5px rgba(0, 0, 0, 0.534);
        }
    </style>
</head>
<body>
    <h1 style="color:aqua">hello</h1>
    <h1 class="name">hello2</h1>
    <h1 id="example">hello3</h1>

    <h2 class="text">Lorem ipsum dolor sit amet.</h2>
</body>
</html>
