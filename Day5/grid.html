<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            background: black;
            font-family: sans-serif;
        }
        .parent {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-auto-rows: 90px;
    gap: 15px;
    padding: 40px;
}
.parent div{
    border-radius: 15px;
    color: aliceblue;
    font-size: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    cursor: pointer;

    transition: all 0.4s ease;
}
    
.div1 {
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.div2 {
    background: linear-gradient(135deg, #43cea2, #185a9d);
}

.div3 {
     background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

.div4 {
    background: linear-gradient(135deg, #04645f, #27ce0a);
}

.div5 {
     background: linear-gradient(135deg, #db078a, #150cbb);
}

.div6 {
     background: linear-gradient(135deg, #04704e, #10ea09);
}

.div7 {
     background: linear-gradient(135deg, #bb0652, #092cdc);
}

.div8 {
     background: linear-gradient(135deg, #d85c09, #e75045);
}

.parent div:hover{
    transform: translateY(-10px) scale(1.05);
}
.parent div:active{
    transform: scale(0.95);
}

.div1{
    grid-column: span 5;
}
.div2{
    grid-column: span 4;
    grid-row: span 2;
}
.div3{
    grid-column: 5;
    grid-row: 2/span 4;

}
.div4{
    grid-column: 2/span 2;
    grid-row: 4 /span 2;
}

.div5{
    grid-column: 1;
    grid-row: 4;
}
.div6{
    grid-column: 1;
    grid-row: 5;

}
.div7{
    grid-column: 4;
    grid-row: 4;
}
.div8{
    grid-column: 4;
    grid-row: 5;
}
.parent div::after{
    content: "⭐";
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 15px;
}
@media(max-width: 768px){
    .parent{
        grid-template-columns: repeat(2, 1fr);
    }
    .parent div{
        grid-column: span 2 !important;
        grid-row:auto !important;
    }
}
        
    </style>
</head>
<body>
    

<div class="parent">
    <div class="div1">1</div>
    <div class="div2">2</div>
    <div class="div3">3</div>
    <div class="div4">4</div>
    <div class="div5">5</div>
    <div class="div6">6</div>
    <div class="div7">7</div>
    <div class="div8">8</div>
</div>
    
</body>
</html>
