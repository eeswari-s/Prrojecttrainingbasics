<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            background: #111;
            font-family: sans-serif;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(3,1fr);
        
            gap: 20px;
            padding: 50px;
        }
        .box{
            height: 150px;
            color: azure;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            border-radius: 10px;
        }

        .box1{
            background: #3498db;
            animation: upDown 2s infinite;
        }
        .box2{
            background: red;
            animation: rotate 2s infinite linear;
        }
        .box3{
            background: green;
            animation: scaleBox 2s infinite;
        }
        .box4{
            background: yellow;
            animation: slideLeftRight 2s infinite;
        }
        .box5{
            background: blueviolet;
            animation: fadeBox 2s infinite;
        }
        .box6{
            background: rgb(11, 207, 145);
            animation: skewBox 2s infinite;
        }

        @keyframes upDown{
            0%,100%{
                transform: translateY(0);}
                50%{
                    transform: translateY(-20px);
                }  
        }

        @keyframes rotate{
            0%{
                transform: rotate(0);
            }
            100%{
                transform: rotate(360deg);
            }
        }

        @keyframes scaleBox{
            0%{
                transform: scale(1);
            }
            50%{
                transform: scale(1.2);
            }
            100%{
                transform: scale(1);
            }
        }

        @keyframes slideLeftRight{
            0%,100%{transform: translateX(0);}
            50%{transform: translateX(30px);}
        }

        @keyframes fadeBox{
            0%,100%{opacity: 5;}
            50%{opacity: 0.5;}
        }

        @keyframes skewBox{
            0%,100%{transform: skewX(0);}
            50%{transform: skewX(30deg);}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">UP Down</div>
        <div class="box box2">Rotate</div>
        <div class="box box3">scale</div>
        <div class="box box4">Slide</div>
        <div class="box box5">Fade</div>
        <div class="box box6">Skew</div>
    </div>
</body>
</html>
