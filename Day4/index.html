<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Full Design</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e1e2f;
  padding: 15px 30px;
  color: white;
}

.logo {
  font-size: 22px;
}

.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* LAYOUT */
.layout {
  display: flex;
  min-height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #2c2c44;
  display: flex;
  flex-direction: column;
  padding: 20px;
  gap: 15px;
}

.sidebar a {
  color: white;
  text-decoration: none;
  padding: 10px;
  border-radius: 6px;
}

.sidebar a:hover {
  background: #40405f;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 30px;
}

.content h1 {
  margin-bottom: 20px;
}

/* CARD CONTAINER */
.card-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

/* CARD */
.card {
  background: white;
  flex: 1 1 220px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-6px);
}

.card h3 {
  margin-bottom: 10px;
  color: #555;
}

.card p {
  font-size: 26px;
  font-weight: bold;
  color: #333;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    flex-direction: row;
    width: 100%;
  }
}

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h2 class="logo">FlexUI</h2>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Dashboard</a>
      <a href="#">Profile</a>
      <a href="#">Logout</a>
    </nav>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a href="#">Overview</a>
      <a href="#">Users</a>
      <a href="#">Reports</a>
      <a href="#">Settings</a>
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <h1>Dashboard</h1>

      <div class="card-container">
        <div class="card">
          <h3>Users</h3>
          <p>1,245</p>
        </div>

        <div class="card">
          <h3>Revenue</h3>
          <p>$12,500</p>
        </div>

        <div class="card">
          <h3>Orders</h3>
          <p>320</p>
        </div>

        <div class="card">
          <h3>Feedback</h3>
          <p>85%</p>
        </div>
      </div>
    </main>

  </div>

</body>
</html>
